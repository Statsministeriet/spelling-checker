<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/png" href="app-icon.png" />
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #1e1e1e;
    color: #eee;
    border-radius: 10px;
    overflow: hidden;
  }
  .container {
    padding: 14px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 13px;
    font-weight: 600;
    margin: 0;
    color: #9ad;
  }
  #settings {
    background: none;
    border: none;
    color: #999;
    font-size: 15px;
    cursor: pointer;
    padding: 2px 6px;
  }
  #activeModel {
    font-size: 11px;
    color: #7ee787;
    margin-bottom: 6px;
    min-height: 14px;
  }
  #status {
    font-size: 11px;
    color: #999;
    margin-bottom: 8px;
    min-height: 14px;
  }
  textarea {
    width: 100%;
    box-sizing: border-box;
    height: 190px;
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
    resize: none;
  }
  .buttons {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .split-button {
    position: relative;
    display: flex;
    flex: 1;
  }
  .split-main {
    flex: 1;
    border: none;
    border-radius: 6px 0 0 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    background: #3b82f6;
    color: white;
  }
  .split-caret {
    border: none;
    border-left: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 0 6px 6px 0;
    padding: 6px 8px;
    font-size: 11px;
    cursor: pointer;
    background: #3b82f6;
    color: white;
  }
  #polishSplit .split-main,
  #polishSplit .split-caret {
    background: #444;
    color: #eee;
  }
  button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .split-menu {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    overflow: hidden;
    z-index: 10;
  }
  .split-menu.open {
    display: block;
  }
  .split-menu button {
    width: 100%;
    box-sizing: border-box;
    background: none;
    border: none;
    color: #eee;
    text-align: left;
    padding: 8px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .split-menu button:hover {
    background: #3a3a3a;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI Værktøj</h1>
      <button id="settings" title="Indstillinger">⚙</button>
    </div>
    <div id="activeModel"></div>
    <div id="status">Skriv eller indsæt tekst herunder</div>
    <textarea id="input" placeholder="Skriv eller indsæt tekst her..."></textarea>
    <div class="buttons">
      <div class="split-button" id="spellingSplit">
        <button class="split-main" id="spellingBtn">Ret stavefejl</button>
        <button class="split-caret" id="spellingCaret">▾</button>
        <div class="split-menu" id="spellingMenu">
          <button data-mode="spelling">Ret stavefejl og kopiér output</button>
        </div>
      </div>
      <div class="split-button" id="polishSplit">
        <button class="split-main" id="polishBtn">Finpuds tekst</button>
        <button class="split-caret" id="polishCaret">▾</button>
        <div class="split-menu" id="polishMenu">
          <button data-mode="polish">Finpuds tekst og kopiér output</button>
        </div>
      </div>
    </div>
  </div>
  <script src="trayWindow.js"></script>
</body>
</html>
