<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/png" href="app-icon.png" />
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #1e1e1e;
    color: #eee;
    border-radius: 10px;
    overflow: hidden;
    -webkit-app-region: drag;
  }
  .container {
    padding: 14px;
    -webkit-app-region: no-drag;
  }
  h1 {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 8px 0;
    color: #9ad;
  }
  #activeModel {
    font-size: 11px;
    color: #7ee787;
    margin-bottom: 4px;
  }
  #count {
    font-size: 11px;
    color: #999;
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    box-sizing: border-box;
    height: 180px;
    background: #2a2a2a;
    color: #eee;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
    resize: none;
  }
  .buttons {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  button {
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  #accept {
    background: #3b82f6;
    color: white;
  }
  #cancel {
    background: #444;
    color: #eee;
  }
</style>
</head>
<body>
  <div class="container">
    <h1 id="title">Rettelser fundet</h1>
    <div id="activeModel"></div>
    <div id="count"></div>
    <textarea id="corrected"></textarea>
    <div class="buttons">
      <button id="cancel">Luk</button>
      <button id="accept">Accepter &amp; indsæt</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
